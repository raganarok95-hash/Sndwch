// ─── SUPABASE ─────────────────────────────────────────────────────────────────
function sbHeaders() {
  return {
    'apikey': KEY_SB,
    'Authorization': 'Bearer ' + KEY_SB,
    'Content-Type': 'application/json'
  };
}
async function sbGet(table, query) {
  var r = await fetch(URL_SB + '/rest/v1/' + table + '?' + query, {headers: sbHeaders()});
  var d = await r.json();
  if (!r.ok) throw new Error(d.message || d.details || 'Error');
  return d;
}
async function sbPost(table, data) {
  var r = await fetch(URL_SB + '/rest/v1/' + table, {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), {Prefer: 'return=representation'}),
    body: JSON.stringify(data)
  });
  var d = await r.json();
  if (!r.ok) throw new Error(d.message || d.details || 'Error');
  return d;
}
async function sbPatch(table, query, data) {
  var r = await fetch(URL_SB + '/rest/v1/' + table + '?' + query, {
    method: 'PATCH',
    headers: Object.assign({}, sbHeaders(), {Prefer: 'return=representation'}),
    body: JSON.stringify(data)
  });
  var d = await r.json();
  if (!r.ok) throw new Error(d.message || d.details || 'Error');
  return d;
}

function orderTotal() {

}

// ─── SOUND ───────────────────────────────────────────────────────────────────
function playChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var notes = [523, 659, 784];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain= ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      var t = ctx.currentTime + i * 0.16;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.06);
      gain.gain.linearRampToValueAtTime(0, t + 0.4);
      osc.start(t);
      osc.stop(t + 0.45);
    });
  } catch(e) {}
}

  pollTimer = setInterval(function() {
    if (screen !== 'admin_home') return;
    Promise.all([
      sbGet('orders', 'status=in.(RECIBIDO,PREPARANDO,EN%20CAMINO)&order=created_at.desc&limit=30'),
      sbGet('transactions', 'confirmed=eq.false&type=eq.earn_pending&order=created_at.desc&limit=50')
    ]).then(function(results) {
      var newCount = results[0].length + results[1].length;
      if (newCount > pollCount && pollCount >= 0) playChime();
      pollCount    = newCount;
      adminOrders  = results[0];
      adminPending = results[1];
      render();
    }).catch(function(){});
  }, 25000);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; pollCount = 0; }
}

async function submitOrder() {
  var nom   = document.getElementById('o-name').value.trim();
  var addr  = document.getElementById('o-addr').value.trim();
  var notes = document.getElementById('o-notes').value.trim();
  var errEl = document.getElementById('o-err');
  if (!nom || !addr) { if (errEl) errEl.textContent = 'Ingresa tu nombre y dirección.'; return; }

  var sig  = byId(SIGS, selSig);
  var prot = byId(PROTS, selProt);
  var t    = orderTotal();
  var ref  = newRef();

  // Build summary for admin
  var sumParts = [];
  if (orderMode === 'sig' && sig) sumParts.push(sig.name + ' S/' + sig.price);
  else sumParts.push(label(PROTS, selProt) + ' S/' + (prot ? prot.price : ''));
  if (addLarge) sumParts.push('+LARGE');
  if (addToast) sumParts.push('+TOAST');
  if (addCombo) sumParts.push('+COMBO ' + addCombo.toUpperCase());
  var summary = sumParts.join(' · ');

  // WhatsApp message
  var lines = ['*PEDIDO SND//WCH*', 'Ref: ' + ref, '', '👤 ' + nom, '📍 ' + addr, ''];
  if (orderMode === 'sig' && sig) {
    lines.push('★ ' + sig.name + ' — S/' + sig.price);
    lines.push('Base: ' + label(BASES, sig.base));
    lines.push('Proteína: ' + label(PROTS, sig.prot));
    lines.push('Salsas: ' + sig.sauces.map(function(id){ return label(SAUCES, id); }).join(' + '));
  } else {
    lines.push('Base: ' + label(BASES, selBase));
    lines.push('Proteína: ' + label(PROTS, selProt) + ' S/' + (prot ? prot.price : ''));
    lines.push('Toppings: ' + (selTops.length ? selTops.map(function(id){ return label(TOPS,id); }).join(', ') : 'ninguno'));
    lines.push('Salsas: ' + selSauces.map(function(id){ return label(SAUCES,id); }).join(' + '));
    if (extraSauces.length) lines.push('+ Extra: ' + extraSauces.map(function(id){ return label(SAUCES,id); }).join(', ') + ' S/' + extraSauces.length*2);
  }
  if (addLarge) lines.push('+ LARGE S/5');
  if (addToast) lines.push('+ TOAST S/2');
  if (addCombo) lines.push('+ COMBO ' + addCombo.toUpperCase() + ' S/' + (addCombo==='full'?8:4));
  if (notes)    lines.push('📝 ' + notes);
  lines.push('', '*TOTAL: S/' + t + '*');
  if (customer) lines.push('Cliente: ' + customer.name + ' (' + customer.phone + ')');

  window.open('https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(lines.join('\n')), '_blank');

  // Save order
  try { await sbPost('orders', {ref:ref, customer_phone:customer?customer.phone:null, customer_name:nom, customer_address:addr, summary:summary, total:t, status:'RECIBIDO', date:todayStr()}); }
  catch(e) { console.warn('order save:', e); }

  // Save pending points
  if (customer) {
    try {
      await sbPost('transactions', {customer_phone:customer.phone, type:'earn_pending', points:t, description:'Pedido SND//WCH', order_ref:ref, confirmed:false, date:todayStr()});
      var upd = await sbPatch('customers', 'phone=eq.' + encodeURIComponent(customer.phone), {pending_points:(customer.pending_points||0)+t, total_orders:(customer.total_orders||0)+1});
      if (upd && upd[0]) customer = Object.assign({}, customer, upd[0]);
      else { customer.pending_points = (customer.pending_points||0)+t; customer.total_orders = (customer.total_orders||0)+1; }
    } catch(e) { console.warn('points save:', e); }
  }

  localStorage.setItem('sw_last_ref', ref);

  // Reset order state
  selSig=null; selBase=null; selProt=null; selTops=[]; selSauces=[]; extraSauces=[]; addLarge=false; addToast=false; addCombo=null;
  screen = 'sent'; render();
}

async function doRegister() {
  var name  = document.getElementById('r-name').value.trim();
  var phone = document.getElementById('r-phone').value.trim();
  var pin   = document.getElementById('r-pin').value.trim();
  var err   = document.getElementById('auth-err');
  if (!name || !phone || pin.length < 4) { if (err) err.textContent = 'Completa todos los campos. PIN mínimo 4 dígitos.'; return; }
  loading = true; loadMsg = 'Creando cuenta...'; render();
  try {
    var ex = await sbGet('customers', 'phone=eq.' + encodeURIComponent(phone));
    if (ex.length) { authError = 'Ya existe una cuenta con ese teléfono.'; loading = false; render(); return; }
    var r = await sbPost('customers', {phone:phone, name:name, pin:pin, points:0, pending_points:0, total_orders:0, total_redeemed:0});
    customer = r[0] || {phone:phone, name:name, pin:pin, points:0, pending_points:0, total_orders:0, total_redeemed:0};
  } catch(e) { authError = 'Error: ' + e.message; loading = false; render(); return; }
  localStorage.setItem('sw_ph', phone);
  localStorage.setItem('sw_pn', pin);
  savedPhone = phone; savedPin = pin;
  loading = false; screen = 'pts_home'; render();
}

async function doLogin() {
  var phone = document.getElementById('l-phone').value.trim();
  var pin   = document.getElementById('l-pin').value.trim();
  var err   = document.getElementById('auth-err');
  if (!phone || !pin) { if (err) err.textContent = 'Ingresa teléfono y PIN.'; return; }
  loading = true; loadMsg = 'Verificando...'; render();
  try {
    var rows = await sbGet('customers', 'phone=eq.' + encodeURIComponent(phone));
    if (!rows.length || rows[0].pin !== pin) { authError = 'Teléfono o PIN incorrecto.'; loading = false; render(); return; }
    customer = rows[0];
  } catch(e) { authError = 'Error de conexión.'; loading = false; render(); return; }
  localStorage.setItem('sw_ph', phone);
  localStorage.setItem('sw_pn', pin);
  savedPhone = phone; savedPin = pin;
  loading = false; screen = 'pts_home'; render();
}

async function doRedeem(id) {
  var r = byId(REWARDS, id);
  if (!r || (customer.points || 0) < r.pts) return;
  var code = 'RDM-' + r.name + '-' + r.pts + 'PTS-' + Date.now().toString(36).toUpperCase().slice(-4);
  loading = true; loadMsg = 'Procesando canje...'; render();
  try {
    await sbPost('transactions', {customer_phone:customer.phone, type:'redeem', points:-r.pts, description:r.name+' // '+r.sub+' canjeado', confirmed:true, date:todayStr()});
    var upd = await sbPatch('customers', 'phone=eq.' + encodeURIComponent(customer.phone), {points:(customer.points||0)-r.pts, total_redeemed:(customer.total_redeemed||0)+1});
    if (upd && upd[0]) customer = Object.assign({}, customer, upd[0]);
    else { customer.points = (customer.points||0)-r.pts; customer.total_redeemed = (customer.total_redeemed||0)+1; }
  } catch(e) { loading = false; render(); return; }
  loading = false; redeemReward = r; redeemCode = code; screen = 'pts_redeemed'; render();
}

  try {
    await sbPatch('orders', 'id=eq.' + orderId, {status: newStatus});
    adminOrders = adminOrders.map(function(o){ return o.id === orderId ? Object.assign({}, o, {status: newStatus}) : o; });
    if (newStatus === 'ENTREGADO') adminOrders = adminOrders.filter(function(o){ return o.id !== orderId; });
    render();
  } catch(e) { console.warn(e); }
}

async function confirmPayment(txnId, phone, pts) {
  try {
    await sbPatch('transactions', 'id=eq.' + txnId, {confirmed: true});
    var rows = await sbGet('customers', 'phone=eq.' + encodeURIComponent(phone));
    if (rows.length) await sbPatch('customers', 'phone=eq.' + encodeURIComponent(phone), {points:(rows[0].points||0)+pts, pending_points:Math.max(0,(rows[0].pending_points||0)-pts)});
    adminPending = adminPending.filter(function(t){ return t.id !== txnId; });
    if (customer && customer.phone === phone) { customer.points=(customer.points||0)+pts; customer.pending_points=Math.max(0,(customer.pending_points||0)-pts); }
    render();
  } catch(e) { console.warn(e); }
}

async function rejectPayment(txnId, phone, pts) {
  try {
    await sbPatch('transactions', 'id=eq.' + txnId, {type: 'earn_rejected'});
    var rows = await sbGet('customers', 'phone=eq.' + encodeURIComponent(phone));
    if (rows.length) await sbPatch('customers', 'phone=eq.' + encodeURIComponent(phone), {pending_points:Math.max(0,(rows[0].pending_points||0)-pts)});
    adminPending = adminPending.filter(function(t){ return t.id !== txnId; });
    render();
  } catch(e) { console.warn(e); }
}

function sendUpsell(idx) {
  var ph   = document.getElementById('u-phone') ? document.getElementById('u-phone').value.trim() : upsellPhone;

    + BIG_BTN('OTORGAR PUNTOS //', 'doManualPoints()')
    + '</div>'

async function doManualPoints() {
  var ph  = document.getElementById('m-phone').value.trim();
  var pts = parseInt(document.getElementById('m-pts').value || 0);
  manualPhone = ph; manualPts = String(pts);
  if (!ph || pts < 1) { manualMsg = 'Ingresa teléfono y puntos válidos.'; render(); return; }
  loading = true; loadMsg = 'Otorgando puntos...'; render();
  try {
    var rows = await sbGet('customers', 'phone=eq.' + encodeURIComponent(ph));
    if (!rows.length) { manualMsg = 'Cliente no encontrado: ' + ph; loading = false; render(); return; }
    await sbPost('transactions', {customer_phone:ph, type:'earn_confirmed', points:pts, description:'Puntos manuales (admin)', confirmed:true, date:todayStr()});
    await sbPatch('customers', 'phone=eq.' + encodeURIComponent(ph), {points:(rows[0].points||0)+pts});
    manualMsg = '✓ +' + pts + ' puntos otorgados a ' + rows[0].name;
    if (customer && customer.phone === ph) customer.points = (customer.points||0)+pts;
  } catch(e) { manualMsg = 'Error: ' + e.message; }
  loading = false; render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (loading) {
    document.getElementById('app').innerHTML = LOADING(loadMsg);
    return;
  }
  var html;
  switch(screen) {
    case 'home':         html = screenHome();         break;
    case 'sig':          html = screenSig();          break;
    case 'build':        html = screenBuild();        break;
    case 'confirm':      html = screenConfirm();      break;
    case 'sent':         html = screenSent();         break;
    case 'pts_auth':     html = screenAuth();         break;
    case 'pts_home':     html = screenPtsHome();      break;
    case 'pts_orders':   html = screenPtsOrders();    break;
    case 'pts_history':  html = screenPtsHistory();   break;
    case 'pts_rewards':  html = screenPtsRewards();   break;
    case 'pts_redeemed': html = screenPtsRedeemed();  break;
    case 'pts_profile':  html = screenPtsProfile();   break;
    case 'admin_pin':    html = screenAdminPin();     break;
    case 'admin_home':   html = screenAdminHome();    break;
    case 'admin_upsell': html = screenAdminUpsell();  break;
    case 'admin_manual': html = screenAdminManual();  break;
    default:             html = screenHome();
  }
  document.getElementById('app').innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;background:#0B0B0B">' + html + '</div>';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async function init() {
  if (savedPhone && savedPin) {
    try {
      var rows = await sbGet('customers', 'phone=eq.' + encodeURIComponent(savedPhone));
      if (rows.length && rows[0].pin === savedPin) customer = rows[0];
    } catch(e) {}
  }
  render();
})();

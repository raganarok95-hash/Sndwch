// ─── SOUND ──────────────────────────────────────────────────────
function playChime(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      var t=ctx.currentTime+i*0.16;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.06);g.gain.linearRampToValueAtTime(0,t+.4);
      o.start(t);o.stop(t+.45);
    });
  }catch(e){}
}

    ]).then(function(r){
      var n=r[0].length+r[1].length;
      if(n>pollCount&&pollCount>=0)playChime();

async function submitOrder(){

  var sig=byId(SIGS,selSig),prot=byId(PROTS,selProt),t=orderTotal(),ref=newRef();
  var sp=[];
  if(orderMode==='sig'&&sig)sp.push(sig.name+' S/'+sig.price);else sp.push(lbl(PROTS,selProt)+' S/'+(prot?prot.price:''));
  if(addLarge)sp.push('+LARGE');if(addToast)sp.push('+TOAST');if(addCombo)sp.push('+COMBO');
  var summary=sp.join(' · ');
  var lines=['*PEDIDO SND//WCH*','Ref: '+ref,'','👤 '+nom,'📍 '+addr,''];

  if(addLarge)lines.push('+ LARGE S/5');if(addToast)lines.push('+ TOAST S/2');if(addCombo)lines.push('+ COMBO '+(addCombo==='full'?'FULL S/8':'SIMPLE S/4'));if(notes)lines.push('📝 '+notes);lines.push('','*TOTAL: S/'+t+'*');if(customer)lines.push('Cliente: '+customer.name+' ('+customer.phone+')');
  window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(lines.join('\n')),'_blank');
  try{await sbPost('orders',{ref:ref,customer_phone:customer?customer.phone:null,customer_name:nom,customer_address:addr,summary:summary,total:t,status:'RECIBIDO',date:todayStr()});}catch(e){console.warn(e);}

  }

  selSig=null;selBase=null;selProt=null;selTops=[];selSauces=[];extraSauces=[];addLarge=false;addToast=false;addCombo=null;
  screen='sent';render();

async function doRegister(){
  var name=document.getElementById('r-name').value.trim(),phone=document.getElementById('r-phone').value.trim(),pin=document.getElementById('r-pin').value.trim();
  var err=document.getElementById('auth-err');
  if(!name||!phone||pin.length<4){if(err)err.textContent='Completa todos los campos. PIN mínimo 4 dígitos.';return;}
  loading=true;loadMsg='Creando cuenta...';render();
  try{var ex=await sbGet('customers','phone=eq.'+encodeURIComponent(phone));if(ex.length){authError='Ya existe una cuenta con ese teléfono.';loading=false;render();return;}var r=await sbPost('customers',{phone:phone,name:name,pin:pin,points:0,pending_points:0,total_orders:0,total_redeemed:0});customer=r[0]||{phone:phone,name:name,pin:pin,points:0,pending_points:0,total_orders:0,total_redeemed:0};}
  catch(e){authError='Error: '+e.message;loading=false;render();return;}
  localStorage.setItem('sw_ph',phone);localStorage.setItem('sw_pn',pin);savedPhone=phone;savedPin=pin;loading=false;screen='pts_home';render();
}
async function doLogin(){
  var phone=document.getElementById('l-phone').value.trim(),pin=document.getElementById('l-pin').value.trim();
  var err=document.getElementById('auth-err');
  if(!phone||!pin){if(err)err.textContent='Ingresa teléfono y PIN.';return;}
  loading=true;loadMsg='Verificando...';render();
  try{var rows=await sbGet('customers','phone=eq.'+encodeURIComponent(phone));if(!rows.length||rows[0].pin!==pin){authError='Teléfono o PIN incorrecto.';loading=false;render();return;}customer=rows[0];}
  catch(e){authError='Error de conexión.';loading=false;render();return;}

    +'<div style="flex:1;padding:20px;overflow-y:auto" class="fi"><div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:#555;letter-spacing:.2em;margin-bottom:12px">PEDIDOS ACTIVOS // '+(ao.length||'ninguno')+'</div>'+oH
    +'<div style="height:1px;background:#141414;margin:16px 0"></div><div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:#555;letter-spacing:.2em;margin-bottom:12px">CONFIRMAR PAGOS // '+(ap.length||'ninguno')+'</div>'+pH
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">'+[['ACTUALIZAR //','loadAdminData()'],['SCRIPTS UPSELL //','screen=\'admin_upsell\';render()'],['PUNTOS MANUALES //','screen=\'admin_manual\';render()']].map(function(x){return'<div onclick="'+x[1]+'" style="background:#0d0d0d;border:1px solid #141414;border-radius:10px;padding:12px 16px;cursor:pointer"><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:700;color:#444">'+x[0]+'</span></div>';}).join('')+'<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:#222;text-align:center;margin-top:6px">Auto-actualiza cada 25 seg · Sonido al recibir pedido</div></div></div></div>';
}

var UPSELL_MSGS=[
  {icon:'🔥',label:'TOAST IT',        body:'Hola {NAME}! ✅ Pedido recibido.\n\n¿Le hacemos TOAST? 🔥 Prensado en plancha, queda crocante. +S/2. ¿Lo agrego?'},
  {icon:'💪',label:'LARGE',            body:'¡Hola {NAME}! Pedido recibido 💪\n\n¿Quieres el LARGE? +50g proteína por S/5. ¿Lo agrego?'},
  {icon:'🌶️',label:'SALSA EXTRA',     body:'¡Hola {NAME}! ✅\n\n¿Agregamos salsa extra? 10 opciones, +S/2. ¿Cuál quisieras?'},
  {icon:'🥤',label:'COMBO',            body:'¡Hola {NAME}! ✅\n\n¿Agrego bebida? Agua, Inca Kola o energy — S/4 más 🥤'},
  {icon:'✅',label:'PAGO OK + PUNTOS', body:'¡Perfecto {NAME}! 🎉 Pago confirmado.\n\nTu código de puntos: [CÓDIGO]\n→ sndwch1.netlify.app → PUNTOS 📱\n\nTiempo estimado: 20-25 min ⏱️'},
  {icon:'🛵',label:'EN CAMINO',        body:'🛵 {NAME}, tu pedido ya va en camino!\nLlega en aprox. [X] minutos 👌'},
  {icon:'⭐',label:'POST-ENTREGA',     body:'Hola {NAME}! ¿Disfrutaste tu SND//WCH? 🙌\n\nUna reseña nos ayudaría mucho:\n[LINK GOOGLE]\nSolo 30 segundos ✨'}
];
function sendUpsell(i){
  var ph=document.getElementById('u-phone')?document.getElementById('u-phone').value.trim():upsellPhone;
  var nm=document.getElementById('u-name')?document.getElementById('u-name').value.trim():upsellName;
  upsellPhone=ph;upsellName=nm;
  var num='51'+ph.replace(/[^0-9]/g,'').replace(/^51/,'');
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(UPSELL_MSGS[i].body.replace(/{NAME}/g,nm||'el cliente')),'_blank');
}
function screenAdminUpsell(){return'<div style="min-height:100vh;display:flex;flex-direction:column;background:#0B0B0B"><div style="padding:20px 20px 16px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:12px"><button onclick="screen=\'admin_home\';render()" style="all:unset;cursor:pointer;color:#555;font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;padding-right:12px">←</button><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;font-weight:900;color:#fff">SCRIPTS<span style="color:'+BLUE+'"> // </span>UPSELL</div></div><div style="flex:1;padding:20px;overflow-y:auto" class="fi"><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+INP('u-phone','TELÉFONO // 9XXXXXXXX','tel',upsellPhone)+INP('u-name','NOMBRE DEL CLIENTE','text',upsellName)+BTN('ACTUALIZAR //','(function(){upsellPhone=document.getElementById(\'u-phone\').value;upsellName=document.getElementById(\'u-name\').value;render();})()')+'</div>'+UPSELL_MSGS.map(function(m,i){return'<button onclick="sendUpsell('+i+')" style="all:unset;cursor:pointer;display:block;width:100%;background:#0a1a0a;border:1px solid #25D366;border-radius:10px;padding:12px 16px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">'+m.icon+'</span><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:700;color:#fff">'+m.label+'</span></div><span style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:#25D366">→</span></div></button>';}).join('')+'</div></div>';}
function screenAdminManual(){return'<div style="min-height:100vh;display:flex;flex-direction:column;background:#0B0B0B"><div style="padding:20px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:12px"><button onclick="screen=\'admin_home\';render()" style="all:unset;cursor:pointer;color:#555;font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;padding-right:12px">←</button><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;font-weight:900;color:#fff">PUNTOS<span style="color:'+BLUE+'"> // </span>MANUALES</div></div><div style="flex:1;padding:24px 20px" class="fi"><p style="font-family:\'Barlow\',sans-serif;font-size:14px;color:#888;margin-bottom:20px;line-height:1.6">Otorga puntos confirmados directamente a un cliente.</p><div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">'+INP('m-phone','TELÉFONO // 9XXXXXXXX','tel',manualPhone)+INP('m-pts','PUNTOS A OTORGAR // Ej: 25','number',manualPts)+BTN('OTORGAR PUNTOS //','doManualPoints()')+'</div><div id="m-msg" style="font-family:\'Barlow\',sans-serif;font-size:13px;color:'+BLUE+';min-height:20px">'+manualMsg+'</div></div></div>';}
async function doManualPoints(){
  var ph=document.getElementById('m-phone').value.trim(),pts=parseInt(document.getElementById('m-pts').value||0);
  manualPhone=ph;manualPts=String(pts);
  if(!ph||pts<1){manualMsg='Ingresa teléfono y puntos válidos.';render();return;}
  loading=true;loadMsg='Otorgando puntos...';render();
  try{var rows=await sbGet('customers','phone=eq.'+encodeURIComponent(ph));if(!rows.length){manualMsg='Cliente no encontrado.';loading=false;render();return;}await sbPost('transactions',{customer_phone:ph,type:'earn_confirmed',points:pts,description:'Puntos manuales (admin)',confirmed:true,date:todayStr()});await sbPatch('customers','phone=eq.'+encodeURIComponent(ph),{points:(rows[0].points||0)+pts});manualMsg='✓ +'+pts+' puntos a '+rows[0].name;if(customer&&customer.phone===ph)customer.points=(customer.points||0)+pts;}
  catch(e){manualMsg='Error: '+e.message;}
  loading=false;render();
}

// ─── RENDER ──────────────────────────────────────────────────────
function render(){
  if(loading){document.getElementById('app').innerHTML=LOADING(loadMsg);return;}
  var h;
  switch(screen){
    case'home':         h=screenHome();break;
    case'sig':          h=screenSig();break;
    case'build':        h=screenBuild();break;
    case'confirm':      h=screenConfirm();break;
    case'sent':         h=screenSent();break;
    case'pts_auth':     h=screenAuth();break;
    case'pts_home':     h=screenPtsHome();break;
    case'pts_orders':   h=screenPtsOrders();break;
    case'pts_history':  h=screenPtsHistory();break;
    case'pts_rewards':  h=screenPtsRewards();break;
    case'pts_redeemed': h=screenPtsRedeemed();break;
    case'pts_profile':  h=screenPtsProfile();break;
    case'admin_pin':    h=screenAdminPin();break;
    case'admin_home':   h=screenAdminHome();break;
    case'admin_upsell': h=screenAdminUpsell();break;
    case'admin_manual': h=screenAdminManual();break;
    default:            h=screenHome();
  }
  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;background:#0B0B0B">'+h+'</div>';
}

// ─── INIT ────────────────────────────────────────────────────────
(async function(){
  if(savedPhone&&savedPin){try{var c=await sbGet('customers','phone=eq.'+encodeURIComponent(savedPhone));if(c.length&&c[0].pin===savedPin)customer=c[0];}catch(e){}}
  render();
})();
</script>

// RENDER
function doGPS(){
  if(!navigator.geolocation){alert('GPS no disponible.');return;}
  var btn=document.getElementById('gps-btn');
  if(btn){btn.textContent='...';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude,lon=pos.coords.longitude;
      var url='https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=es';
      fetch(url)
        .then(function(r){return r.json();})
        .then(function(d){
          var parts=[];
          if(d.road||d.street)parts.push(d.road||d.street);
          var hn=d.houseNumber||d.building;
          parts.push(hn?hn:'sin número');
          if(d.neighbourhood||d.suburb||d.locality)parts.push(d.neighbourhood||d.suburb||d.locality);
          var addr=parts.length?parts.join(', '):'Lat: '+lat.toFixed(5)+', Lon: '+lon.toFixed(5);
          applyGPS(addr,'https://maps.google.com/?q='+lat+','+lon);
        })
        .catch(function(){
          applyGPS('Lat: '+lat.toFixed(5)+', Lon: '+lon.toFixed(5),'https://maps.google.com/?q='+lat+','+lon);
        });
    },
    function(err){
      var btn=document.getElementById('gps-btn');
      if(btn){btn.textContent='GPS';btn.disabled=false;}
      if(err.code===1)alert('Permiso denegado. Actívalo en ajustes.');
      else alert('No se pudo obtener ubicación.');
    },
    {timeout:15000,enableHighAccuracy:true,maximumAge:0}
  );
}
function applyGPS(addr,mapsUrl){
  var el=document.getElementById('o-addr');
  var hint=document.getElementById('gps-hint');
  var btn=document.getElementById('gps-btn');
  if(el){el.value=addr;el.style.borderColor='#3A86FF';el.focus();}
  if(hint)hint.innerHTML='<a href="'+mapsUrl+'" target="_blank" style="color:#3A86FF;font-size:11px;text-decoration:none">&#128205; Verificar en Google Maps</a>';
  if(btn){btn.innerHTML='&#10003;';btn.style.color='#3A86FF';btn.disabled=false;}
  setTimeout(function(){
    var e=document.getElementById('o-addr');if(e)e.style.borderColor='#1e1e1e';
    var b=document.getElementById('gps-btn');if(b){b.innerHTML='&#128205;';b.style.color='#555';}
  },3000);
}

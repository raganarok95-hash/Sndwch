async function doConfirm(txnId,phone,pts){
  try{
    await sbU('transactions','id=eq.'+txnId,{confirmed:true});
    var cd=await sbG('customers','phone=eq.'+encodeURIComponent(phone));
    var newPts=0,custName='cliente';
    if(cd.length){
      var c=cd[0];
      custName=c.name||'cliente';
      newPts=(c.points||0)+pts;
      await sbU('customers','phone=eq.'+encodeURIComponent(phone),{points:newPts,pending_points:Math.max(0,(c.pending_points||0)-pts)});
    }
    adminPending=adminPending.filter(function(t){return t.id!==txnId;});
    if(cust&&cust.phone===phone){cust.points=newPts;cust.pending_points=Math.max(0,(cust.pending_points||0)-pts);}
    // Build WA message with points + redemption hint
    var hint='';
    var elig=REWARDS.slice().reverse().find(function(r){return newPts>=r.pts;});
    if(elig)hint='\n\n✨ Con tus '+newPts+' pts puedes canjear: *'+elig.name+' '+elig.sub+'* ('+elig.val+')\nIngresa en sndwch.vercel.app → PUNTOS → CANJEAR';
    var waMsg='¡Listo '+custName+'! Pago confirmado ✅\n\nTus puntos: *'+newPts+' pts*'+hint+'\n\n⏱️ Tu pedido está en preparación.';
    render();
    setTimeout(function(){
      if(confirm('¿Notificar a '+custName+' por WhatsApp?')){
        window.open('https://wa.me/51'+phone.replace(/^51/,'')+'?text='+encodeURIComponent(waMsg),'_blank');
      }
    },200);
  }catch(e){console.warn(e);}
}

}

// RENDER
function doGPS(){
  if(!navigator.geolocation){openMap(-8.1120,-79.0290);return;}
  var btn=document.getElementById('gps-btn');
  if(btn){btn.innerHTML='<span class="sp">&#8635;</span>';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      if(btn){btn.innerHTML='&#128205;';btn.disabled=false;}
      openMap(pos.coords.latitude,pos.coords.longitude);
    },
    function(){
      if(btn){btn.innerHTML='&#128205;';btn.disabled=false;}
      openMap(-8.1120,-79.0290);
    },
    {timeout:10000,enableHighAccuracy:true,maximumAge:0}
  );
}
var _lmap=null,_mTimer=null;
function openMap(lat,lon){
  var m=document.getElementById('mmap');
  if(!m)return;
  m.style.display='flex';
  setTimeout(function(){
    if(!_lmap){
      _lmap=L.map('lmap',{zoomControl:true,attributionControl:false});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_lmap);
      _lmap.on('move',function(){var e=document.getElementById('maddr');if(e)e.textContent='Buscando...';if(_mTimer)clearTimeout(_mTimer);});
      _lmap.on('moveend',function(){var c=_lmap.getCenter();if(_mTimer)clearTimeout(_mTimer);_mTimer=setTimeout(function(){revGeo(c.lat,c.lng);},700);});
    }
    _lmap.setView([lat,lon],17);
    _lmap.invalidateSize();
    revGeo(lat,lon);
  },150);
}
function revGeo(lat,lon){
  window._mLat=lat;window._mLon=lon;
  fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=es')
    .then(function(r){return r.json();})
    .then(function(d){
      var p=[];
      if(d.road||d.street)p.push(d.road||d.street);
      if(d.houseNumber)p.push(d.houseNumber);
      if(d.neighbourhood||d.suburb)p.push(d.neighbourhood||d.suburb);
      var a=p.length?p.join(', '):(d.locality||'Lat '+lat.toFixed(5)+', Lon '+lon.toFixed(5));
      window._mAddr=a;
      var e=document.getElementById('maddr');if(e)e.textContent=a;
    })
    .catch(function(){
      window._mAddr='Lat '+lat.toFixed(5)+', Lon '+lon.toFixed(5);
      var e=document.getElementById('maddr');if(e)e.textContent=window._mAddr;
    });
}
function closeMap(){document.getElementById('mmap').style.display='none';}
function confirmMap(){
  var a=window._mAddr||'';if(!a)return;
  if(_lmap){var c=_lmap.getCenter();window._mLat=c.lat;window._mLon=c.lng;}
  closeMap();
  var el=document.getElementById('o-addr');
  if(el){el.value=a;el.style.borderColor='#3A86FF';el.focus();}
  var h=document.getElementById('gps-hint');
  if(h)h.innerHTML='<a href="https://maps.google.com/?q='+window._mLat+','+window._mLon+'" target="_blank" style="color:#3A86FF;font-size:11px;text-decoration:none">&#128205; Verificar en Google Maps</a>';
  setTimeout(function(){var e=document.getElementById('o-addr');if(e)e.style.borderColor='#1e1e1e';},3000);
}

// SOUND
function playNotif(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.15],[784,.30]].forEach(function(n){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=n[0];o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+n[1]);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+n[1]+.06);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+n[1]+.38);
      o.start(ctx.currentTime+n[1]);
      o.stop(ctx.currentTime+n[1]+.42);
    });
  }catch(e){}
}

function startPoll(){
  if(pollTimer)clearInterval(pollTimer);

    if(sc!=='admin_home')return;

      var total=o.length+p.length;
      if(total>lastPollCount&&lastPollCount>=0)playNotif();
      lastPollCount=total;
      adminOrders=o;adminPending=p;
      render();
    }catch(e){}
  },25000);
}

async function doOrder(){

function doGPS(){

var _lmap=null,_mTimer=null;
function loadLeaflet(cb){
  if(window.L){cb();return;}
  // Load CSS
  var lnk=document.createElement('link');
  lnk.rel='stylesheet';
  lnk.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(lnk);
  // Load JS
  var s=document.createElement('script');
  s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload=cb;
  s.onerror=function(){alert('No se pudo cargar el mapa. Verifica tu conexión.');};
  document.head.appendChild(s);
}
function openMap(lat,lon){
  var m=document.getElementById('mmap');
  if(!m)return;
  m.style.display='flex';
  loadLeaflet(function(){
    setTimeout(function(){
      if(!_lmap){
      _lmap=L.map('lmap',{zoomControl:true,attributionControl:false});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_lmap);
      _lmap.on('move',function(){var e=document.getElementById('maddr');if(e)e.textContent='Buscando...';if(_mTimer)clearTimeout(_mTimer);});
      _lmap.on('moveend',function(){var c=_lmap.getCenter();if(_mTimer)clearTimeout(_mTimer);_mTimer=setTimeout(function(){revGeo(c.lat,c.lng);},700);});
    }
    _lmap.setView([lat,lon],17);
    _lmap.invalidateSize();
    revGeo(lat,lon);
    },150);
  }); // end loadLeaflet
}
function revGeo(lat,lon){
  window._mLat=lat;window._mLon=lon;
  fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=es')
    .then(function(r){return r.json();})
    .then(function(d){
      var p=[];
      if(d.road||d.street)p.push(d.road||d.street);
      if(d.houseNumber)p.push(d.houseNumber);
      if(d.neighbourhood||d.suburb)p.push(d.neighbourhood||d.suburb);
      var a=p.length?p.join(', '):(d.locality||'Lat '+lat.toFixed(5)+', Lon '+lon.toFixed(5));
      window._mAddr=a;
      var e=document.getElementById('maddr');if(e)e.textContent=a;
    })
    .catch(function(){
      window._mAddr='Lat '+lat.toFixed(5)+', Lon '+lon.toFixed(5);
      var e=document.getElementById('maddr');if(e)e.textContent=window._mAddr;
    });
}
function closeMap(){document.getElementById('mmap').style.display='none';}
function confirmMap(){
  var a=window._mAddr||'';if(!a)return;
  if(_lmap){var c=_lmap.getCenter();window._mLat=c.lat;window._mLon=c.lng;}
  closeMap();
  var el=document.getElementById('o-addr');
  if(el){el.value=a;el.style.borderColor='#3A86FF';el.focus();}
  var h=document.getElementById('gps-hint');
  if(h)h.innerHTML='<a href="https://maps.google.com/?q='+window._mLat+','+window._mLon+'" target="_blank" style="color:#3A86FF;font-size:11px;text-decoration:none">&#128205; Verificar en Google Maps</a>';
  setTimeout(function(){var e=document.getElementById('o-addr');if(e)e.style.borderColor='#1e1e1e';},3000);
}

    default:           h=sOHome();
  }
  document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;background:#0B0B0B">'+h+'</div>';
}


var _adminList=[];
async function loadAdminMgr(){sc='admin_mgr';busy=true;busyMsg='Cargando...';render();try{_adminList=await sbG('admin_accounts','order=created_at.asc');}catch(e){_adminList=[];}busy=false;render();}
async function addAdmin(){
  var ph=document.getElementById('aa-ph')&&document.getElementById('aa-ph').value.trim();
  var nm=document.getElementById('aa-nm')&&document.getElementById('aa-nm').value.trim();
  if(!ph||!nm){alert('Ingresa nombre y teléfono.');return;}
  try{
    await fetch(SB_URL+'/rest/v1/admin_accounts',{method:'POST',headers:Object.assign({},sbH(),{Prefer:'return=representation'}),body:JSON.stringify({phone:ph,name:nm,role:'admin'})});
    await loadAdminMgr();
  }catch(e){alert('Error: '+e);}
}
async function delAdmin(ph){
  if(!confirm('¿Eliminar admin '+ph+'?'))return;
  try{await fetch(SB_URL+'/rest/v1/admin_accounts?phone=eq.'+encodeURIComponent(ph),{method:'DELETE',headers:sbH()});await loadAdminMgr();}catch(e){}
}

// ADMIN CHECK
async function checkAdmin(phone){
  // Non-blocking with 3s timeout — never delays render
  try{
    var controller=typeof AbortController!=='undefined'?new AbortController():null;
    var timer=controller?setTimeout(function(){controller.abort();},3000):null;
    var opts=controller?{signal:controller.signal,headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}:{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}};
    var resp=await fetch(SB_URL+'/rest/v1/admin_accounts?phone=eq.'+encodeURIComponent(phone),opts);
    if(timer)clearTimeout(timer);
    var data=await resp.json();
    isAdmin=Array.isArray(data)&&data.length>0;
  }catch(e){
    isAdmin=false; // timeout or network error — fail silently
  }
  render(); // re-render now that we know admin status
}

(async function(){
  render(); // render immediately — never show black screen
  if(savedPh&&savedPn){

      var c=await sbG('customers','phone=eq.'+encodeURIComponent(savedPh));
      if(c.length&&c[0].pin===savedPn){
        cust=c[0];

        checkAdmin(savedPh); // check admin in background, will render again when done
      }
    }catch(e){} // silently fail if offline
  }
})();
